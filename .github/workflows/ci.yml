name: Go CI

on:
  pull_request:

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y yt-dlp ffmpeg

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Mutation testing
        uses: go-gremlins/gremlins-action@v1
        with:
          version: v0.6.0
          args: --threshold-efficacy 100 --threshold-mcover 100

      - name: Build
        run: go build -v ./cmd/musicfreeier
